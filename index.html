<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breno Rifas — Bolão</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{
  --bg:#08090e;
  --bg2:#0f1018;
  --bg3:#161721;
  --card:#0f1018;
  --gold:#c9a227;
  --gold2:#e8c84a;
  --verde:#00c853;
  --vermelho:#ff3d3d;
  --azul:#c9a227;
  --amarelo:#c9a227;
  --texto:#e2e4f0;
  --cinza:#6b7393;
  --borda:#1c1d2a;
  --sombra:0 4px 24px rgba(0,0,0,.6);
  --sombra-gold:0 0 24px rgba(201,162,39,.18);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  background:var(--bg);color:var(--texto);min-height:100vh;
}

/* ── HEADER ── */
header{
  background:var(--bg2);
  border-bottom:2px solid var(--gold);
  overflow:hidden;line-height:0;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 20px rgba(0,0,0,.6);
}
header.com-banner{padding:0;}
header h1{
  font-size:1.3rem;font-weight:900;
  letter-spacing:2px;text-transform:uppercase;
  color:var(--gold);line-height:1.3;
}
header p{font-size:.75rem;color:var(--cinza);margin-top:4px;line-height:1.3;}
.header-fallback{padding:16px;line-height:normal;text-align:center;}
.logo-app{width:100%;display:block;margin:0 auto;vertical-align:top;}
.logo-app.hidden{display:none;}
@media(min-width:900px){.logo-app{max-width:1600px;}}
.logo-preview-admin{
  width:100%;aspect-ratio:3.2/1;object-fit:cover;border-radius:6px;
  display:block;margin:8px auto;border:1px solid var(--borda);
}

/* ── NAV ── */
nav{
  display:flex;justify-content:center;gap:4px;
  background:var(--bg2);padding:10px 12px;
  border-bottom:1px solid var(--borda);flex-wrap:wrap;
}
nav button{
  border:1px solid transparent;background:transparent;
  padding:8px 20px;border-radius:4px;
  font-weight:700;font-size:.77rem;
  cursor:pointer;color:var(--cinza);
  text-transform:uppercase;letter-spacing:.8px;transition:.15s;
}
nav button.active{background:var(--gold);color:#08090e;border-color:var(--gold);}
nav button:not(.active):hover{border-color:rgba(201,162,39,.4);color:var(--gold);}

/* ── MAIN ── */
main{max-width:780px;margin:0 auto;padding:16px;}

/* ── CARD ── */
.card{
  background:var(--card);border-radius:8px;
  padding:18px;margin-bottom:14px;
  box-shadow:var(--sombra);border:1px solid var(--borda);
}
.jogo-card{cursor:pointer;transition:.15s;border-left:3px solid transparent;}
.jogo-card:hover{border-left-color:var(--gold);background:#121320;}
.jogo-card:active{transform:scale(.99);}
.btn-jogar{
  margin-top:12px;font-size:.85rem;padding:12px;
  letter-spacing:1px;text-transform:uppercase;
}

/* ── PLACAR ── */
.placar-row{display:flex;align-items:center;justify-content:center;gap:16px;margin:14px 0;}
.time{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;}
.time img{width:54px;height:auto;border-radius:4px;filter:drop-shadow(0 2px 8px rgba(0,0,0,.7));}
.time span{font-weight:800;font-size:.8rem;text-align:center;color:var(--texto);text-transform:uppercase;letter-spacing:.4px;}
.vs{font-size:1.1rem;font-weight:900;color:var(--cinza);letter-spacing:3px;}
.placar-final{
  font-size:2rem;font-weight:900;color:var(--gold);
  display:flex;gap:10px;align-items:center;justify-content:center;
  text-shadow:0 0 20px rgba(201,162,39,.4);
}

/* ── META ── */
.meta-row{
  display:flex;justify-content:space-between;
  font-size:.74rem;color:var(--cinza);margin-top:8px;flex-wrap:wrap;gap:6px;
}
.badge{
  display:inline-block;padding:3px 10px;border-radius:3px;
  font-size:.66rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px;
}
.badge.aberto{background:rgba(0,200,83,.1);color:var(--verde);border:1px solid rgba(0,200,83,.22);}
.badge.encerrado{background:rgba(255,61,61,.1);color:var(--vermelho);border:1px solid rgba(255,61,61,.22);}

/* ── CONTAGEM ── */
.mini-contagem{
  text-align:center;margin-top:10px;padding-top:10px;
  border-top:1px solid var(--borda);font-size:.73rem;font-weight:800;
  color:var(--gold);letter-spacing:.5px;
}
.contagem-card{text-align:center;background:rgba(201,162,39,.05);border:1px solid rgba(201,162,39,.18);}
.contagem-aviso{font-size:.71rem;font-weight:700;color:var(--gold);margin-bottom:8px;line-height:1.4;opacity:.85;}
.contagem-numero{
  font-size:2.2rem;font-weight:900;color:var(--gold);
  letter-spacing:2px;font-variant-numeric:tabular-nums;
  text-shadow:0 0 24px rgba(201,162,39,.5);
}
.contagem-sub{font-size:.7rem;color:var(--cinza);margin-top:4px;}
.valor{font-weight:800;color:var(--gold);font-size:.92rem;}

/* ── INPUTS ── */
input,select{
  width:100%;padding:11px 12px;
  background:var(--bg3);border:1.5px solid var(--borda);
  border-radius:6px;font-size:.92rem;margin-bottom:10px;
  font-family:inherit;color:var(--texto);transition:.15s;
}
input:focus,select:focus{
  outline:none;border-color:var(--gold);
  box-shadow:0 0 0 2px rgba(201,162,39,.1);
}
input::placeholder{color:var(--cinza);}
select option{background:var(--bg3);}
label{
  font-size:.7rem;font-weight:800;color:var(--cinza);
  display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.8px;
}
.field{margin-bottom:14px;}
.placar-inputs{display:flex;align-items:center;gap:10px;justify-content:center;margin:10px 0;}
.placar-inputs input{
  width:64px;text-align:center;font-size:1.4rem;font-weight:900;margin:0;
  color:var(--gold);border-color:rgba(201,162,39,.35);
}

/* ── BOTÕES ── */
.btn{
  width:100%;padding:13px;border:none;border-radius:6px;
  font-weight:800;font-size:.87rem;cursor:pointer;
  transition:.15s;letter-spacing:.6px;text-transform:uppercase;
}
.btn-primary{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#08090e;
  box-shadow:0 4px 16px rgba(201,162,39,.28);
}
.btn-primary:hover{box-shadow:0 4px 24px rgba(201,162,39,.5);}
.btn-primary:active{transform:scale(.98);}
.btn-secondary{background:var(--bg3);color:var(--texto);border:1px solid var(--borda);}
.btn-danger{background:rgba(255,61,61,.1);color:var(--vermelho);border:1px solid rgba(255,61,61,.22);}
.btn-amarelo{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#08090e;font-weight:800;}
.btn:disabled{opacity:.38;cursor:not-allowed;}

/* ── PALPITES ── */
.lista-palpites{margin-top:14px;}
.palpite-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 0;border-bottom:1px solid var(--borda);font-size:.85rem;
}
.palpite-item:last-child{border-bottom:none;}
.status-pago{color:var(--verde);font-weight:800;font-size:.7rem;text-transform:uppercase;letter-spacing:.4px;}
.status-pendente{color:var(--gold);font-weight:800;font-size:.7rem;text-transform:uppercase;letter-spacing:.4px;}

/* ── PIX ── */
.pix-box{
  background:rgba(201,162,39,.05);border:1.5px dashed rgba(201,162,39,.3);
  border-radius:8px;padding:14px;margin:14px 0;font-size:.84rem;
}
.pix-box code{
  display:block;background:var(--bg3);padding:8px;border-radius:5px;
  word-break:break-all;font-size:.78rem;margin-top:6px;
  border:1px solid var(--borda);color:var(--gold);
}

/* ── EMPTY ── */
.empty{text-align:center;color:var(--cinza);padding:32px 0;font-size:.88rem;}

/* ── TABS ADMIN ── */
.tabs-admin{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.tabs-admin button{
  flex:1;padding:9px;border:1px solid var(--borda);
  background:var(--bg3);border-radius:5px;
  font-size:.73rem;font-weight:800;cursor:pointer;
  color:var(--cinza);text-transform:uppercase;letter-spacing:.5px;
}
.tabs-admin button.active{background:var(--gold);color:#08090e;border-color:var(--gold);}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:var(--bg3);color:var(--texto);
  padding:12px 22px;border-radius:6px;
  font-size:.84rem;z-index:999;opacity:0;
  transition:.3s;pointer-events:none;
  border:1px solid var(--borda);border-left:4px solid var(--gold);
  box-shadow:var(--sombra-gold);min-width:220px;text-align:center;
}
.toast.show{opacity:1;bottom:30px;}
.hidden{display:none !important;}

/* ── RANKING ── */
.ranking-item{
  display:flex;justify-content:space-between;padding:9px 0;
  border-bottom:1px solid var(--borda);font-size:.84rem;
}

/* ── PRÊMIO ── */
.premio-box{
  background:linear-gradient(135deg,rgba(201,162,39,.07),rgba(232,200,74,.04));
  border:1.5px solid rgba(201,162,39,.28);
  border-radius:8px;padding:16px;margin-top:10px;text-align:center;
}
.premio-valor{font-size:1.8rem;font-weight:900;color:var(--gold);text-shadow:var(--sombra-gold);}
.small-text{font-size:.72rem;color:var(--cinza);margin-top:4px;}

/* ── LOGIN ── */
.login-box{max-width:340px;margin:60px auto;}

/* ── MESA DESTAQUE ── */
.mesa-destaque{
  background:linear-gradient(135deg,#13141f,#1a1b2c);
  padding:18px;border:1px solid rgba(201,162,39,.18);
  border-left:4px solid var(--gold);
}
.mesa-row{display:flex;gap:12px;}
.mesa-item{flex:1;display:flex;flex-direction:column;align-items:center;text-align:center;}
.mesa-label{font-size:.65rem;color:var(--cinza);font-weight:800;text-transform:uppercase;letter-spacing:.5px;}
.mesa-valor{font-size:1.6rem;font-weight:900;color:var(--texto);margin:5px 0;}
.mesa-valor.mesa-premio{color:var(--gold);text-shadow:0 0 20px rgba(201,162,39,.4);}
.mesa-sub{font-size:.64rem;color:var(--cinza);}
.mesa-rifa-aviso{
  margin-top:12px;padding-top:12px;
  border-top:1px solid rgba(255,255,255,.07);
  text-align:center;font-size:.7rem;color:var(--cinza);
}

/* ── PREVIEW GANHO ── */
.preview-ganho{margin:10px 0;}
.preview-box{
  background:rgba(0,200,83,.05);border:1px solid rgba(0,200,83,.18);
  border-radius:7px;padding:10px 14px;
  font-size:.8rem;color:var(--verde);line-height:1.5;
}
.preview-valor{color:var(--verde);font-size:.96rem;font-weight:800;}

/* ── LISTA PAPEL ── */
.lista-papel{border:1px solid var(--borda);border-radius:7px;overflow:hidden;}
.lista-papel-header{
  display:grid;grid-template-columns:36px 1fr 1.4fr 56px;
  gap:6px;padding:9px 12px;background:var(--bg3);
  font-size:.64rem;font-weight:800;color:var(--cinza);
  text-transform:uppercase;letter-spacing:.5px;
}
.lista-papel-row{
  display:grid;grid-template-columns:36px 1fr 1.4fr 56px;
  gap:6px;padding:10px 12px;border-top:1px solid var(--borda);
  font-size:.82rem;align-items:center;
}
.lista-papel-row:nth-child(even){background:rgba(255,255,255,.012);}
.lp-num{color:var(--cinza);font-weight:700;font-size:.72rem;}
.lp-placar{font-weight:900;color:var(--gold);}
.lp-nome{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* ── POPUP ── */
.popup-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0);
  display:flex;align-items:center;justify-content:center;
  z-index:1000;padding:20px;pointer-events:none;transition:background .25s;
}
.popup-overlay.show{background:rgba(0,0,0,.82);pointer-events:auto;}
.popup-box{
  background:var(--bg2);border-radius:10px;padding:26px 22px;
  max-width:340px;width:100%;text-align:center;position:relative;
  transform:scale(.85);opacity:0;transition:.25s;
  box-shadow:0 20px 60px rgba(0,0,0,.9),var(--sombra-gold);
  border:1px solid rgba(201,162,39,.18);
}
.popup-overlay.show .popup-box{transform:scale(1);opacity:1;}
.popup-fechar{
  position:absolute;top:10px;right:12px;background:none;border:none;
  font-size:1.1rem;color:var(--cinza);cursor:pointer;width:28px;height:28px;
}
.popup-emoji{font-size:2.2rem;margin-bottom:4px;}
.popup-titulo{font-size:.84rem;color:var(--cinza);font-weight:600;}
.popup-ganho-valor{font-size:2.4rem;font-weight:900;color:var(--gold);margin:6px 0 2px;text-shadow:0 0 20px rgba(201,162,39,.5);}
.popup-sub{font-size:.76rem;color:var(--cinza);margin-bottom:16px;}
.popup-detalhe{
  background:var(--bg3);border-radius:8px;padding:12px 14px;
  text-align:left;margin-bottom:12px;border:1px solid var(--borda);
}
.popup-linha{
  display:flex;justify-content:space-between;font-size:.76rem;
  padding:4px 0;color:var(--cinza);border-bottom:1px solid var(--borda);
}
.popup-linha:last-child{border-bottom:none;}
.popup-linha span:last-child{font-weight:800;color:var(--texto);}
.popup-aviso{font-size:.7rem;color:var(--cinza);line-height:1.4;opacity:.7;}

/* ── BANDEIRA PREVIEW ── */
.bandeira-preview{
  display:flex;align-items:center;gap:8px;margin:6px 0 10px;
  font-size:.7rem;color:var(--cinza);min-height:24px;
}
.bandeira-preview img{width:28px;height:auto;border-radius:3px;}

/* ── PAGAMENTOS ── */
.pendente-card{
  border:1px solid rgba(201,162,39,.15);background:rgba(201,162,39,.04);
  border-radius:8px;padding:14px;margin-bottom:12px;
  border-left:3px solid var(--gold);
}
.pendente-nome{font-weight:900;font-size:.92rem;color:var(--texto);}
.pendente-tel{font-size:.76rem;color:var(--cinza);margin-bottom:2px;}
.pendente-acoes{display:flex;flex-direction:column;gap:8px;margin-top:10px;}
.btn-confirmar-grande{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#08090e;border:none;padding:14px;border-radius:6px;
  font-size:.9rem;font-weight:900;cursor:pointer;letter-spacing:.5px;width:100%;
  text-transform:uppercase;box-shadow:0 4px 16px rgba(201,162,39,.28);
}
.btn-confirmar-grande:active{transform:scale(.98);}
.pendente-acoes-sec{display:flex;gap:8px;}
.btn-whats{
  flex:1;text-align:center;background:#128c7e;color:#fff;
  text-decoration:none;padding:9px;border-radius:6px;
  font-size:.76rem;font-weight:700;text-transform:uppercase;letter-spacing:.3px;
}
.pendente-acoes-sec .btn-remover-palpite{
  background:none;border:1px solid rgba(255,61,61,.22);color:var(--vermelho);
  cursor:pointer;font-size:.75rem;padding:8px 12px;border-radius:6px;
}

/* ── FOOTER ── */
footer{
  text-align:center;padding:24px;font-size:.7rem;color:var(--cinza);
  border-top:1px solid var(--borda);margin-top:8px;letter-spacing:.5px;
}
</style>
</head>

<header id="headerApp">
  <img id="logoApp" class="logo-app hidden" alt="Breno Rifas">

</nav>

<main id="app"></main>

<div id="toast" class="toast"></div>

<footer>Breno Rifas · Bolão Online — desenvolvido para a comunidade</footer>

function toast(msg){

  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2600);
}
function formatBRL(v){
  return (v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
}
function bandeiraUrl(codigoPais){
  return `https://flagcdn.com/w160/${codigoPais.toLowerCase()}.png`;
}
function imagemTime(j, lado){
  // lado = 'A' ou 'B'. Usa imagem customizada se admin tiver colado uma URL, senão cai no padrão por país.
  const urlCustom = lado==='A' ? j.imagemA : j.imagemB;
  if(urlCustom) return urlCustom;
  const pais = lado==='A' ? j.paisA : j.paisB;
  return bandeiraUrl(pais || 'br');
}

function identificarCodigoPais(nomeTime){
  if(!nomeTime) return '';
  const chave = nomeTime.trim().toLowerCase();
  return PAISES_CODIGO[chave] || '';
}
function fmtData(iso){
  if(!iso) return '';
  const d = new Date(iso+'T00:00:00');
  return d.toLocaleDateString('pt-BR');
}
function dataHoraJogo(j){
  // Combina data + hora do jogo num timestamp. Jogos antigos sem 'hora' caem à meia-noite.
  const hora = j.hora || '00:00';
  return new Date(`${j.data}T${hora}:00`);
}
function tempoRestanteMs(j){
  return dataHoraJogo(j).getTime() - Date.now();
}
function jogoFechadoPorTempo(j){
  return tempoRestanteMs(j) <= 0;
}
function fmtContagem(ms){
  if(ms<=0) return '00:00:00';
  const totalSeg = Math.floor(ms/1000);
  const dias = Math.floor(totalSeg/86400);
  const horas = Math.floor((totalSeg%86400)/3600);
  const min = Math.floor((totalSeg%3600)/60);
  const seg = totalSeg%60;
  const pad = n=>String(n).padStart(2,'0');
  if(dias>0) return `${dias}d ${pad(horas)}:${pad(min)}:${pad(seg)}`;
  return `${pad(horas)}:${pad(min)}:${pad(seg)}`;
}

document.getElementById('navMenu').addEventListener('click', e=>{
  const btn = e.target.closest('button[data-view]');
  if(!btn) return;
  setView(btn.dataset.view);
});
function setView(v){
  viewAtual = v;
  jogoSelecionado = null;
  document.querySelectorAll('#navMenu button').forEach(b=>{
    b.classList.toggle('active', b.dataset.view===v);
  });
  render();
}

/* Acesso discreto ao admin: 5 toques no cabeçalho (texto ou banner) em até 2 segundos */
let contadorCliquesTitulo = 0;
let timeoutCliquesTitulo = null;
document.getElementById('headerApp').addEventListener('click', ()=>{
  contadorCliquesTitulo++;
  clearTimeout(timeoutCliquesTitulo);
  if(contadorCliquesTitulo>=5){
    contadorCliquesTitulo = 0;
    setView('admin');
    return;
  }
  timeoutCliquesTitulo = setTimeout(()=>{ contadorCliquesTitulo=0; }, 2000);
});

db.ref('jogos').on('value', snap=>{

});
db.ref('palpites').on('value', snap=>{
  const novoCache = snap.val() || {};
  detectarNovoPendente(palpitesCache, novoCache);
  palpitesCache = novoCache;
  render();
});
db.ref('configApp/logoUrl').on('value', snap=>{
  const urlCustom = snap.val();
  const url = urlCustom || BANNER_HEADER_PADRAO; // se o admin não trocou ainda, usa o banner padrão embutido
  configAppCache.logoUrl = urlCustom || '';
  const logoEl = document.getElementById('logoApp');
  const fallbackEl = document.getElementById('headerFallback');
  const headerEl = document.getElementById('headerApp');
  if(url){
    logoEl.src = url;
    logoEl.classList.remove('hidden');
    fallbackEl.classList.add('hidden');
    headerEl.classList.add('com-banner');
  } else {
    logoEl.classList.add('hidden');
    fallbackEl.classList.remove('hidden');
    headerEl.classList.remove('com-banner');
  }
  if(viewAtual==='admin' && adminTabAtual==='config') render();
});

let primeiroCarregamentoPalpites = true;
function detectarNovoPendente(antigo, novo){
  if(primeiroCarregamentoPalpites){
    primeiroCarregamentoPalpites = false;
    return; // não notifica no carregamento inicial da página
  }
  if(!adminLogado) return;
  const idsAntigos = new Set(Object.keys(antigo||{}));
  const idsNovos = Object.keys(novo||{});
  const recemChegados = idsNovos.filter(id=>!idsAntigos.has(id) && !novo[id].pago);
  if(recemChegados.length>0){
    notificarNovoPendente(novo[recemChegados[0]]);
  }
}
function notificarNovoPendente(palpite){
  toast(`🔔 Novo palpite de ${palpite.nome} aguardando confirmação!`);
  if(navigator.vibrate) navigator.vibrate([100,50,100]);
  tocarBeep();
}
function tocarBeep(){
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine'; osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.4);
    osc.start(); osc.stop(ctx.currentTime+0.4);
  }catch(e){}
}

/* ===================== LISTA DE JOGOS (PÚBLICO) ===================== */
function renderListaJogos(){
  // Ordena por data+hora do jogo: mais próximo primeiro. Jogos já encerrados vão pro final, mais recentes primeiro entre eles.
  const ids = Object.keys(jogosCache).sort((a,b)=>{
    const ja = jogosCache[a], jb = jogosCache[b];
    const aEncerrado = ja.status==='encerrado', bEncerrado = jb.status==='encerrado';
    if(aEncerrado !== bEncerrado) return aEncerrado ? 1 : -1; // abertos primeiro
    if(aEncerrado && bEncerrado) return (jb.criadoEm||0)-(ja.criadoEm||0);
    return dataHoraJogo(ja).getTime() - dataHoraJogo(jb).getTime();
  });
  if(ids.length===0){
    return `<div class="empty">Nenhum jogo cadastrado ainda.<br>Volte em breve! ⚽</div>`;
  }
  return ids.map(id=>{
    const j = jogosCache[id];
    const fechadoPorTempo = jogoFechadoPorTempo(j);
    const aberto = j.status !== 'encerrado' && !fechadoPorTempo;
    const restante = tempoRestanteMs(j);
    return `
    <div class="card jogo-card" data-jogo="${id}">
      <div class="placar-row">
        <div class="time"><img src="${imagemTime(j,'A')}" alt="${j.timeA}"><span>${j.timeA}</span></div>
        ${j.status==='encerrado' && j.placarA!=null
          ? `<div class="placar-final">${j.placarA} <span style="font-size:1rem;color:#999">x</span> ${j.placarB}</div>`
          : `<div class="vs">X</div>`}
        <div class="time"><img src="${imagemTime(j,'B')}" alt="${j.timeB}"><span>${j.timeB}</span></div>
      </div>
      <div class="meta-row">
        <span class="valor">${formatBRL(j.valor)}</span>
        <span>${fmtData(j.data)} ${j.hora||''}</span>
        <span class="badge ${aberto?'aberto':'encerrado'}">${j.status==='encerrado'?'Encerrado':(fechadoPorTempo?'Fechado p/ apostas':'Aberto')}</span>
      </div>
      ${j.status!=='encerrado' && !fechadoPorTempo ? `<div class="mini-contagem" data-contagem="${id}">⏱️ ${fmtContagem(restante)}</div>` : ''}
      <button class="btn btn-primary btn-jogar" data-jogo="${id}">
        ${j.status==='encerrado' ? '🏆 Ver resultado' : (fechadoPorTempo ? '🔒 Ver bolão' : '⚽ JOGAR')}
      </button>
    </div>`;
  }).join('');
}

let timeoutPreviewGanho = null;
function atualizarPreviewGanho(jogoId){
  const a = document.getElementById('palpiteA').value;
  const b = document.getElementById('palpiteB').value;
  clearTimeout(timeoutPreviewGanho);
  if(a==='' || b===''){ fecharPopupGanho(); return; }
  // pequeno debounce pra não abrir popup a cada tecla, só quando a pessoa pausa de digitar
  timeoutPreviewGanho = setTimeout(()=> mostrarPopupGanho(jogoId, a, b), 450);
}

function mostrarPopupGanho(jogoId, a, b){
  const j = jogosCache[jogoId];
  if(!j) return;

  const pagos = Object.entries(palpitesCache).filter(([_,p])=>p.jogoId===jogoId && p.pago);
  const arrecadado = pagos.length * j.valor;

  // quantos JÁ pagaram com esse mesmo placar (sem contar você ainda, já que você nem pagou)
  const concorrentes = pagos.filter(([_,p])=>p.placarA===parseInt(a) && p.placarB===parseInt(b)).length;
  const totalSeVoceEntrar = concorrentes + 1; // você entraria nessa disputa
  const arrecadadoComVoce = arrecadado + j.valor;
  const taxaOrganizacao = arrecadadoComVoce * TAXA_ADMIN;
  const premioComVoce = arrecadadoComVoce - taxaOrganizacao;
  const seuGanho = premioComVoce / totalSeVoceEntrar;

  let popup = document.getElementById('popupGanho');
  if(!popup){
    popup = document.createElement('div');
    popup.id = 'popupGanho';
    popup.className = 'popup-overlay';
    document.body.appendChild(popup);
    popup.onclick = (e)=>{ if(e.target===popup) fecharPopupGanho(); };
  }
  popup.innerHTML = `
    <div class="popup-box">
      <button class="popup-fechar" id="btnFecharPopupGanho">✕</button>
      <div class="popup-emoji">💰</div>
      <div class="popup-titulo">Se o placar for ${a} x ${b}...</div>
      <div class="popup-ganho-valor">${formatBRL(seuGanho)}</div>
      <div class="popup-sub">é o que você ganharia</div>
      <div class="popup-detalhe">
        <div class="popup-linha"><span>Mesa total (com você)</span><span>${formatBRL(arrecadadoComVoce)}</span></div>
        <div class="popup-linha"><span>Taxa da organização (20%)</span><span>− ${formatBRL(taxaOrganizacao)}</span></div>
        <div class="popup-linha"><span>Prêmio a dividir</span><span>${formatBRL(premioComVoce)}</span></div>
        <div class="popup-linha"><span>Concorrendo com esse placar</span><span>${totalSeVoceEntrar} pessoa${totalSeVoceEntrar>1?'s':''}</span></div>
      </div>
      <div class="popup-aviso">⚠️ Esse valor é calculado com base em quem já pagou até agora. Pode mudar até o fim das apostas.</div>
      <div class="popup-aviso popup-aviso-rifa">🎟️ Se ninguém acertar o palpite, o dinheiro será sorteado entre os participantes.</div>
    </div>`;
  popup.classList.add('show');
  document.getElementById('btnFecharPopupGanho').onclick = fecharPopupGanho;
}

function fecharPopupGanho(){
  const popup = document.getElementById('popupGanho');
  if(popup) popup.classList.remove('show');
}

function enviarPalpite(){
  const j = jogosCache[jogoSelecionado];
  if(!j || j.status==='encerrado' || jogoFechadoPorTempo(j)){
    toast('Esse bolão já fechou para novas apostas');
    render();
    return;
  }
  const nome = document.getElementById('palpiteNome').value.trim();
  const telefone = document.getElementById('palpiteTelefone').value.trim();
  const placarA = document.getElementById('palpiteA').value;
  const placarB = document.getElementById('palpiteB').value;

  if(!nome || !telefone){ toast('Preencha nome e telefone'); return; }
  if(placarA==='' || placarB===''){ toast('Preencha o placar do seu palpite'); return; }
  fecharPopupGanho();

  const novo = {
    jogoId: jogoSelecionado,
    nome, telefone,
    placarA: parseInt(placarA), placarB: parseInt(placarB),
    pago: false,
    criadoEm: Date.now()
  };
  const ref = db.ref('palpites').push();
  ref.set(novo).then(()=>{
    palpitePendenteId = ref.key;
    render();
    mostrarPix();
  });
}

        ${!p.pago ? `<div class="pix-box" style="margin-top:10px;text-align:center">

          <img src="${QRCODE_PIX_URL}" alt="QR Code Pix" style="display:block;max-width:180px;width:100%;margin:10px auto;border-radius:8px;border:1px solid #eee">
          <div style="text-align:left">Chave: <code>${CHAVE_PIX}</code></div>
        </div>` : ''}
      </div>`;
    }).join('');
  }
});

/* ===================== ADMIN ===================== */

}

function renderAdminPainel(){
  return `
  <div style="display:flex;justify-content:flex-end;margin-bottom:10px">
    <button class="btn btn-secondary" id="btnLogoutAdmin" style="width:auto;padding:6px 14px;font-size:.8rem">Sair</button>
  </div>
  <div class="tabs-admin">
    <button class="tab-admin-btn ${adminTabAtual==='novo'?'active':''}" data-tab="novo">Novo Jogo</button>
    <button class="tab-admin-btn ${adminTabAtual==='pagamentos'?'active':''}" data-tab="pagamentos">Pagamentos</button>

  <div class="card">

    <p class="small-text" style="margin-bottom:12px">Imagem ideal: 1600x500 (proporção ~3.2:1, formato de faixa larga). Ela substitui completamente o título em texto no topo do site.</p>

    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn btn-primary" id="btnSalvarLogo">Salvar banner</button>

function renderAdminNovoJogo(){
  return `
  <div class="card">
    <h3 style="margin-bottom:12px;font-size:1rem">Criar novo jogo</h3>
    <div class="field">
      <label>Nome do time A</label>
      <input type="text" id="novoTimeA" placeholder="Ex: Brasil">
      <div class="bandeira-preview" id="previewBandeiraA"></div>
    </div>
    <div class="field"><label>Código do país A (preenchido automático, edite se precisar)</label><input type="text" id="novoPaisA" placeholder="br" maxlength="2"></div>
    <div class="field"><label>URL da imagem A (opcional — use se a bandeira automática não servir)</label><input type="text" id="novoImagemA" placeholder="https://..."></div>
    <div class="field">
      <label>Nome do time B</label>
      <input type="text" id="novoTimeB" placeholder="Ex: Alemanha">
      <div class="bandeira-preview" id="previewBandeiraB"></div>
    </div>
    <div class="field"><label>Código do país B (preenchido automático, edite se precisar)</label><input type="text" id="novoPaisB" placeholder="de" maxlength="2"></div>
    <div class="field"><label>URL da imagem B (opcional — use se a bandeira automática não servir)</label><input type="text" id="novoImagemB" placeholder="https://..."></div>
    <div class="field"><label>Valor da aposta (R$)</label><input type="number" step="0.01" id="novoValor" placeholder="3.00"></div>
    <div class="field"><label>Data do jogo</label><input type="date" id="novoData"></div>
    <div class="field"><label>Horário do jogo</label><input type="time" id="novoHora" value="16:00"></div>
    <button class="btn btn-primary" id="btnCriarJogo">Criar jogo</button>
  </div>
  <div class="card">
    <h3 style="margin-bottom:8px;font-size:1rem">Jogos cadastrados</h3>
    ${Object.keys(jogosCache).length===0 ? '<div class="empty">Nenhum jogo ainda.</div>' :
      Object.entries(jogosCache).sort((a,b)=>(b[1].criadoEm||0)-(a[1].criadoEm||0)).map(([id,j])=>`
        <div class="palpite-item">
          <span>${j.timeA} x ${j.timeB} — ${formatBRL(j.valor)}</span>
          <span>
            <button class="btn-editar-bandeira" data-jogo="${id}" style="background:none;border:none;color:var(--azul);cursor:pointer;font-size:.78rem;font-weight:700;margin-right:10px">Trocar imagem</button>
            <button class="btn-excluir-jogo" data-jogo="${id}" style="background:none;border:none;color:var(--vermelho);cursor:pointer;font-size:.78rem;font-weight:700">Excluir</button>
          </span>
        </div>`).join('')}

function autoIdentificarBandeira(lado){
  const nomeInput = document.getElementById('novoTime'+lado);
  const paisInput = document.getElementById('novoPais'+lado);
  if(!nomeInput || !paisInput) return;
  const codigo = identificarCodigoPais(nomeInput.value);
  if(codigo){
    paisInput.value = codigo;
  }
  atualizarPreviewBandeira(lado);
}

function atualizarPreviewBandeira(lado){
  const preview = document.getElementById('previewBandeira'+lado);
  if(!preview) return;
  const imagemInput = document.getElementById('novoImagem'+lado);
  const paisInput = document.getElementById('novoPais'+lado);
  const urlCustom = imagemInput ? imagemInput.value.trim() : '';
  const codigo = paisInput ? paisInput.value.trim() : '';
  const url = urlCustom || (codigo ? bandeiraUrl(codigo) : '');
  if(!url){ preview.innerHTML=''; return; }
  preview.innerHTML = `<img src="${url}" alt="preview" onerror="this.style.display='none'"> <span>${urlCustom?'imagem customizada':'bandeira identificada: '+codigo.toUpperCase()}</span>`;
}

function criarJogo(){
  const timeA = document.getElementById('novoTimeA').value.trim();
  const paisA = document.getElementById('novoPaisA').value.trim().toLowerCase();
  const imagemA = document.getElementById('novoImagemA').value.trim();
  const timeB = document.getElementById('novoTimeB').value.trim();
  const paisB = document.getElementById('novoPaisB').value.trim().toLowerCase();
  const imagemB = document.getElementById('novoImagemB').value.trim();
  const valor = parseFloat(document.getElementById('novoValor').value);
  const data = document.getElementById('novoData').value;
  const hora = document.getElementById('novoHora').value || '00:00';

  if(!timeA || !timeB || !paisA || !paisB || !valor || !data){
    toast('Preencha todos os campos'); return;
  }
  db.ref('jogos').push({
    timeA, paisA, imagemA: imagemA || null,
    timeB, paisB, imagemB: imagemB || null,
    valor, data, hora,
    status:'aberto', criadoEm: Date.now()
  }).then(()=>{
    toast('Jogo criado!');
    render();
  });
}

function editarBandeira(id){
  const j = jogosCache[id];
  if(!j) return;
  const novaA = prompt(`URL da imagem do ${j.timeA} (deixe vazio para usar bandeira padrão):`, j.imagemA||'');
  if(novaA===null) return;
  const novaB = prompt(`URL da imagem do ${j.timeB} (deixe vazio para usar bandeira padrão):`, j.imagemB||'');
  if(novaB===null) return;
  db.ref('jogos/'+id).update({
    imagemA: novaA.trim() || null,
    imagemB: novaB.trim() || null
  }).then(()=>toast('Imagem(ns) atualizada(s)!'));
}

function excluirJogo(id){
  if(!confirm('Excluir este jogo e todos os palpites relacionados?')) return;
  db.ref('jogos/'+id).remove();
  Object.entries(palpitesCache).filter(([_,p])=>p.jogoId===id).forEach(([pid])=>{
    db.ref('palpites/'+pid).remove();
  });
  toast('Jogo excluído');
}

function renderAdminPagamentos(){
  const termoBusca = (document.getElementById('buscaPendentes')?.value || '').toLowerCase().trim();
  let pendentes = Object.entries(palpitesCache).filter(([_,p])=>!p.pago);
  pendentes = pendentes.sort((a,b)=>(b[1].criadoEm||0)-(a[1].criadoEm||0)); // mais recente primeiro
  if(termoBusca){
    pendentes = pendentes.filter(([_,p])=>
      p.nome.toLowerCase().includes(termoBusca) || p.telefone.includes(termoBusca));
  }
  const pagos = Object.entries(palpitesCache).filter(([_,p])=>p.pago).sort((a,b)=>(b[1].criadoEm||0)-(a[1].criadoEm||0));
  return `
  <div class="card">
    <input type="text" id="buscaPendentes" placeholder="🔎 Buscar por nome ou telefone..." value="${termoBusca}">
  </div>
  <div class="card">
    <h3 style="margin-bottom:8px;font-size:1rem">⏳ Pendentes de confirmação (${pendentes.length})</h3>
    ${pendentes.length===0 ? '<div class="empty">Nenhum pagamento pendente.</div>' :
      pendentes.map(([id,p])=>{
        const j = jogosCache[p.jogoId];
        const valor = j ? formatBRL(j.valor) : '';
        const msgWhats = encodeURIComponent(`Oi ${p.nome}! Confirmamos seu pagamento do bolão (${j?`${j.timeA} x ${j.timeB}`:''} — palpite ${p.placarA}x${p.placarB}). Boa sorte! ⚽`);
        const telLimpo = p.telefone.replace(/\D/g,'');
        return `
        <div class="pendente-card">
          <div class="pendente-info">
            <div class="pendente-nome">${p.nome}</div>
            <div class="pendente-tel">${p.telefone}</div>
            <div class="small-text">${j?`${j.timeA} x ${j.timeB}`:'(jogo removido)'} — Palpite: <strong>${p.placarA}x${p.placarB}</strong> — ${valor}</div>
          </div>
          <div class="pendente-acoes">
            <button class="btn-confirmar-pgto btn-confirmar-grande" data-id="${id}">✓ CONFIRMAR PIX</button>
            <div class="pendente-acoes-sec">
              <a href="https://wa.me/55${telLimpo}?text=${msgWhats}" target="_blank" class="btn-whats">WhatsApp</a>
              <button class="btn-remover-palpite" data-id="${id}">remover</button>
            </div>
          </div>
        </div>`;
      }).join('')}
  </div>
  <div class="card">
    <h3 style="margin-bottom:8px;font-size:1rem">✓ Confirmados (${pagos.length})</h3>
    ${pagos.length===0 ? '<div class="empty">Nenhum pagamento confirmado ainda.</div>' :
      pagos.map(([id,p])=>{
        const j = jogosCache[p.jogoId];
        return `<div class="palpite-item">
          <span>${p.nome} — ${j?`${j.timeA}x${j.timeB}`:''} (${p.placarA}x${p.placarB})</span>
          <button class="btn-remover-palpite" data-id="${id}" style="background:none;border:none;color:var(--vermelho);cursor:pointer;font-size:.75rem">remover</button>
        </div>`;
      }).join('')}
  </div>
  `;
}

function confirmarPagamento(id){
  db.ref('palpites/'+id+'/pago').set(true).then(()=>{
    toast('✓ Pix confirmado!');
    if(navigator.vibrate) navigator.vibrate(80);
  });
}
function removerPalpite(id){
  if(!confirm('Remover este palpite?')) return;
  db.ref('palpites/'+id).remove().then(()=>toast('Palpite removido'));
}

function renderAdminResultados(){
  const abertos = Object.entries(jogosCache).filter(([_,j])=>j.status!=='encerrado');
  const encerrados = Object.entries(jogosCache).filter(([_,j])=>j.status==='encerrado');
  return `
  <div class="card">
    <h3 style="margin-bottom:8px;font-size:1rem">🔓 Jogos abertos — lançar resultado</h3>
    ${abertos.length===0?'<div class="empty">Nenhum jogo aberto.</div>':
      abertos.map(([id,j])=>`
      <div class="card" style="background:#fafbfc">
        <div style="font-weight:700;margin-bottom:8px">${j.timeA} x ${j.timeB}</div>
        <div class="placar-inputs">
          <input type="number" min="0" id="resA_${id}" placeholder="0" style="width:50px">
          <span>x</span>
          <input type="number" min="0" id="resB_${id}" placeholder="0" style="width:50px">
        </div>
        <button class="btn-lancar-resultado btn btn-amarelo" data-jogo="${id}">Lançar resultado e encerrar</button>
      </div>`).join('')}
  </div>
  <div class="card">
    <h3 style="margin-bottom:8px;font-size:1rem">🏁 Jogos encerrados</h3>
    ${encerrados.length===0?'<div class="empty">Nenhum jogo encerrado ainda.</div>':
      encerrados.map(([id,j])=>{
        const pagos = Object.entries(palpitesCache).filter(([_,p])=>p.jogoId===id && p.pago);
        const ganhadores = pagos.filter(([_,p])=>p.placarA===j.placarA && p.placarB===j.placarB);
        const precisaSorteio = ganhadores.length===0 && pagos.length>0 && !j.sorteioId;
        return `
        <div class="card" style="background:#fafbfc">
          <div style="font-weight:700">${j.timeA} ${j.placarA} x ${j.placarB} ${j.timeB}</div>
          <div class="small-text">${pagos.length} pago(s) · ${ganhadores.length} acertador(es)</div>
          ${precisaSorteio ? `<button class="btn-sortear btn btn-amarelo" data-jogo="${id}" style="margin-top:8px">🎟️ Ninguém acertou — Sortear ganhador</button>` : ''}
          ${j.sorteioId ? `<div class="small-text" style="color:var(--verde);font-weight:700">Sorteado: ${palpitesCache[j.sorteioId]?.nome||'—'}</div>` : ''}
        </div>`;
      }).join('')}
  </div>
  `;
}

function lancarResultado(jogoId){
  const a = document.getElementById('resA_'+jogoId).value;
  const b = document.getElementById('resB_'+jogoId).value;
  if(a==='' || b===''){ toast('Preencha o placar final'); return; }
  if(!confirm('Confirmar resultado e encerrar o jogo? Essa ação não pode ser desfeita.')) return;
  db.ref('jogos/'+jogoId).update({
    status:'encerrado', placarA: parseInt(a), placarB: parseInt(b)
  }).then(()=>{
    toast('Resultado lançado!');
    render();
  });
}

function sortearGanhador(jogoId){
  const pagos = Object.entries(palpitesCache).filter(([_,p])=>p.jogoId===jogoId && p.pago);
  if(pagos.length===0){ toast('Nenhum participante pago para sortear'); return; }
  const sorteadoIdx = Math.floor(Math.random()*pagos.length);
  const [sorteadoId, sorteadoPalpite] = pagos[sorteadoIdx];
  if(!confirm(`Sortear entre ${pagos.length} participantes pagos?`)) return;
  db.ref('jogos/'+jogoId+'/sorteioId').set(sorteadoId).then(()=>{
    toast(`🎉 Sorteado: ${sorteadoPalpite.nome}`);
    render();
  });
}

/* ===================== INIT ===================== */
render();

/* Atualiza as contagens regressivas a cada segundo, sem re-renderizar a tela inteira
   (evita perder o foco de inputs enquanto a pessoa digita o palpite) */
setInterval(()=>{
  let algumZerou = false;
  document.querySelectorAll('[data-contagem]').forEach(el=>{
    const jogoId = el.dataset.contagem;
    const j = jogosCache[jogoId];
    if(!j) return;
    const restante = tempoRestanteMs(j);
    if(restante<=0){
      algumZerou = true;
    } else {
      el.textContent = el.classList.contains('mini-contagem') ? `⏱️ ${fmtContagem(restante)}` : fmtContagem(restante);
    }
  });
  if(algumZerou) render(); // algum jogo acabou de fechar: re-renderiza pra travar o formulário
}, 1000);
</script>
