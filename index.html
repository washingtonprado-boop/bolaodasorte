<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolão Online</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{
  --verde:#0d8a3e;
  --amarelo:#ffcc29;
  --azul:#1351a3;
  --bg:#f4f6f8;
  --card:#ffffff;
  --texto:#1a1a1a;
  --cinza:#6b7280;
  --vermelho:#d93025;
  --sombra:0 2px 8px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  background:var(--bg);
  color:var(--texto);
  min-height:100vh;
}
header{
  background:linear-gradient(135deg,var(--verde),var(--azul));
  color:#fff;
  padding:18px 16px;
  text-align:center;
  box-shadow:var(--sombra);
}
header h1{font-size:1.4rem;font-weight:800;letter-spacing:.5px;}
header p{font-size:.8rem;opacity:.9;margin-top:4px;}
nav{
  display:flex;
  justify-content:center;
  gap:8px;
  background:#fff;
  padding:10px;
  box-shadow:var(--sombra);
  flex-wrap:wrap;
}
nav button{
  border:none;background:transparent;
  padding:8px 16px;border-radius:20px;
  font-weight:600;font-size:.85rem;
  cursor:pointer;color:var(--cinza);
  transition:.2s;
}
nav button.active{background:var(--verde);color:#fff;}
main{max-width:780px;margin:0 auto;padding:16px;}
.card{
  background:var(--card);
  border-radius:14px;
  padding:18px;
  margin-bottom:16px;
  box-shadow:var(--sombra);
}
.jogo-card{cursor:pointer;transition:.15s;}
.jogo-card:active{transform:scale(.98);}
.placar-row{
  display:flex;align-items:center;justify-content:center;
  gap:16px;margin:14px 0;
}
.time{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  flex:1;
}
.time img{width:64px;height:auto;border-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.2);}
.time span{font-weight:700;font-size:.85rem;text-align:center;}
.vs{font-size:1.4rem;font-weight:900;color:var(--cinza);}
.placar-final{
  font-size:2rem;font-weight:900;color:var(--azul);
  display:flex;gap:10px;align-items:center;justify-content:center;
}
.meta-row{
  display:flex;justify-content:space-between;
  font-size:.78rem;color:var(--cinza);margin-top:8px;
  flex-wrap:wrap;gap:6px;
}
.badge{
  display:inline-block;padding:3px 10px;border-radius:12px;
  font-size:.7rem;font-weight:700;
}
.badge.aberto{background:#d4f4dd;color:var(--verde);}
.badge.encerrado{background:#fde2e1;color:var(--vermelho);}
.valor{font-weight:800;color:var(--verde);font-size:.95rem;}
input,select{
  width:100%;padding:11px;border:1.5px solid #e0e3e8;
  border-radius:8px;font-size:.95rem;margin-bottom:10px;
  font-family:inherit;
}
input:focus,select:focus{outline:none;border-color:var(--verde);}
label{font-size:.78rem;font-weight:700;color:var(--cinza);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px;}
.field{margin-bottom:14px;}
.placar-inputs{display:flex;align-items:center;gap:10px;justify-content:center;margin:10px 0;}
.placar-inputs input{width:64px;text-align:center;font-size:1.4rem;font-weight:800;margin:0;}
.btn{
  width:100%;padding:13px;border:none;border-radius:8px;
  font-weight:700;font-size:.95rem;cursor:pointer;
  transition:.15s;
}
.btn-primary{background:var(--verde);color:#fff;}
.btn-primary:active{transform:scale(.98);}
.btn-secondary{background:#eef0f3;color:var(--texto);}
.btn-danger{background:var(--vermelho);color:#fff;}
.btn-amarelo{background:var(--amarelo);color:#1a1a1a;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.lista-palpites{margin-top:14px;}
.palpite-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 0;border-bottom:1px solid #f0f1f3;
  font-size:.88rem;
}
.palpite-item:last-child{border-bottom:none;}
.status-pago{color:var(--verde);font-weight:700;font-size:.72rem;}
.status-pendente{color:#e8a317;font-weight:700;font-size:.72rem;}
.pix-box{
  background:#fffbea;border:1.5px dashed var(--amarelo);
  border-radius:10px;padding:14px;margin:14px 0;font-size:.85rem;
}
.pix-box code{
  display:block;background:#fff;padding:8px;border-radius:6px;
  word-break:break-all;font-size:.8rem;margin-top:6px;border:1px solid #eee;
}
.empty{text-align:center;color:var(--cinza);padding:30px 0;font-size:.9rem;}
.tabs-admin{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.tabs-admin button{
  flex:1;padding:8px;border:1.5px solid #e0e3e8;background:#fff;
  border-radius:8px;font-size:.78rem;font-weight:700;cursor:pointer;
}
.tabs-admin button.active{background:var(--azul);color:#fff;border-color:var(--azul);}
.toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:#1a1a1a;color:#fff;padding:12px 20px;border-radius:8px;
  font-size:.85rem;z-index:999;opacity:0;transition:.3s;pointer-events:none;
}
.toast.show{opacity:1;bottom:30px;}
.hidden{display:none !important;}
.ranking-item{
  display:flex;justify-content:space-between;padding:8px 0;
  border-bottom:1px solid #f0f1f3;font-size:.85rem;
}
.premio-box{
  background:linear-gradient(135deg,#fff8e1,#fffbea);
  border:1.5px solid var(--amarelo);border-radius:10px;
  padding:14px;margin-top:10px;text-align:center;
}
.premio-valor{font-size:1.6rem;font-weight:900;color:var(--verde);}
.small-text{font-size:.75rem;color:var(--cinza);margin-top:4px;}
.login-box{max-width:340px;margin:60px auto;}
footer{text-align:center;padding:20px;font-size:.72rem;color:var(--cinza);}

/* Mesa em destaque */
.mesa-destaque{background:linear-gradient(135deg,#0d8a3e,#0a6b30);padding:18px;}
.mesa-row{display:flex;gap:12px;}
.mesa-item{flex:1;display:flex;flex-direction:column;align-items:center;text-align:center;}
.mesa-label{font-size:.72rem;color:#d4f4dd;font-weight:700;text-transform:uppercase;letter-spacing:.4px;}
.mesa-valor{font-size:1.7rem;font-weight:900;color:#fff;margin:4px 0;}
.mesa-valor.mesa-premio{color:var(--amarelo);}
.mesa-sub{font-size:.68rem;color:#d4f4dd;}
.mesa-rifa-aviso{
  margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.2);
  text-align:center;font-size:.74rem;color:#fffbea;
}

/* Preview de ganho */
.preview-ganho{margin:10px 0;}
.preview-box{
  background:#eef9f1;border:1.5px solid var(--verde);border-radius:8px;
  padding:10px 12px;font-size:.82rem;color:#0a6b30;line-height:1.4;
}
.preview-valor{color:var(--verde);font-size:1rem;}

/* Lista tipo papel */
.lista-papel{border:1px solid #e0e3e8;border-radius:8px;overflow:hidden;}
.lista-papel-header{
  display:grid;grid-template-columns:36px 1fr 1.4fr 56px;
  gap:6px;padding:8px 10px;background:#f4f6f8;
  font-size:.68rem;font-weight:800;color:var(--cinza);
  text-transform:uppercase;letter-spacing:.3px;
}
.lista-papel-row{
  display:grid;grid-template-columns:36px 1fr 1.4fr 56px;
  gap:6px;padding:9px 10px;border-top:1px solid #f0f1f3;
  font-size:.82rem;align-items:center;
}
.lp-num{color:var(--cinza);font-weight:700;font-size:.75rem;}
.lp-placar{font-weight:800;color:var(--azul);}
.lp-nome{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* Popup de ganho */
.popup-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0);
  display:flex;align-items:center;justify-content:center;
  z-index:1000;padding:20px;pointer-events:none;
  transition:background .25s;
}
.popup-overlay.show{background:rgba(0,0,0,.55);pointer-events:auto;}
.popup-box{
  background:#fff;border-radius:16px;padding:26px 22px;
  max-width:340px;width:100%;text-align:center;position:relative;
  transform:scale(.85);opacity:0;transition:.25s;
  box-shadow:0 10px 40px rgba(0,0,0,.3);
}
.popup-overlay.show .popup-box{transform:scale(1);opacity:1;}
.popup-fechar{
  position:absolute;top:10px;right:12px;background:none;border:none;
  font-size:1.1rem;color:var(--cinza);cursor:pointer;width:28px;height:28px;
}
.popup-emoji{font-size:2.2rem;margin-bottom:4px;}
.popup-titulo{font-size:.88rem;color:var(--cinza);font-weight:600;}
.popup-ganho-valor{font-size:2.4rem;font-weight:900;color:var(--verde);margin:6px 0 2px;}
.popup-sub{font-size:.78rem;color:var(--cinza);margin-bottom:16px;}
.popup-detalhe{
  background:#f7f8fa;border-radius:10px;padding:12px 14px;
  text-align:left;margin-bottom:12px;
}
.popup-linha{
  display:flex;justify-content:space-between;font-size:.78rem;
  padding:4px 0;color:var(--texto);
}
.popup-linha span:last-child{font-weight:700;}
.popup-aviso{font-size:.7rem;color:var(--cinza);line-height:1.4;}

/* Preview de bandeira no formulário admin */
.bandeira-preview{
  display:flex;align-items:center;gap:8px;margin:6px 0 10px;
  font-size:.74rem;color:var(--cinza);min-height:24px;
}
.bandeira-preview img{width:32px;height:auto;border-radius:3px;box-shadow:0 1px 3px rgba(0,0,0,.2);}

/* Painel de confirmação rápida de pagamento */
.pendente-card{
  border:1.5px solid #ffe49a;background:#fffdf6;
  border-radius:10px;padding:12px;margin-bottom:10px;
}
.pendente-nome{font-weight:800;font-size:.95rem;}
.pendente-tel{font-size:.78rem;color:var(--cinza);margin-bottom:2px;}
.pendente-acoes{display:flex;flex-direction:column;gap:8px;margin-top:10px;}
.btn-confirmar-grande{
  background:var(--verde);color:#fff;border:none;
  padding:14px;border-radius:8px;font-size:.95rem;font-weight:800;
  cursor:pointer;letter-spacing:.3px;width:100%;
}
.btn-confirmar-grande:active{transform:scale(.98);}
.pendente-acoes-sec{display:flex;gap:8px;}
.btn-whats{
  flex:1;text-align:center;background:#25d366;color:#fff;
  text-decoration:none;padding:8px;border-radius:6px;
  font-size:.78rem;font-weight:700;
}
.pendente-acoes-sec .btn-remover-palpite{
  background:none;border:1px solid #f0c0c0;color:var(--vermelho);
  cursor:pointer;font-size:.75rem;padding:8px 12px;border-radius:6px;
}
</style>
</head>
<body>

<header>
  <h1>⚽ BOLÃO ONLINE</h1>
  <p>Dê seu palpite e concorra ao prêmio</p>
</header>

<nav id="navMenu">
  <button data-view="jogos" class="active">Jogos</button>
  <button data-view="meus">Meus Palpites</button>
  <button data-view="admin">Admin</button>
</nav>

<main id="app"></main>

<div id="toast" class="toast"></div>

<footer>Bolão Online — desenvolvido para a comunidade</footer>

<script>
/* ===================== CONFIG FIREBASE ===================== */
const firebaseConfig = {
  apiKey: "AIzaSyDy3qfKSLGSELH3Xf1_fB_p3ZZDeX5TSEY",
  authDomain: "boloes-615d5.firebaseapp.com",
  databaseURL: "https://boloes-615d5-default-rtdb.firebaseio.com",
  projectId: "boloes-615d5",
  storageBucket: "boloes-615d5.firebasestorage.app",
  messagingSenderId: "874157018430",
  appId: "1:874157018430:web:c38ee7490a37a004a8b06f"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ===================== CONFIG GERAL ===================== */
const TAXA_ADMIN = 0.20; // 20%
const CHAVE_PIX = "afdf0396-74a3-43a7-9b75-436a4508c549"; // e-mail, telefone, CPF ou aleatória
const NOME_RECEBEDOR = "Washington Bezerra do Prado Fernandes";
const QRCODE_PIX_URL = "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiaqUvPxuYgV2eIH8jGrKjBIXTRWgwioFDZzjMpGjo4ZdwWGyXEPvUv4c_7XjOyhCSJumc1_wJYRpGGylJBt0aTsEKlHREkuOwzSXt-Oj805KFcllHN3UbSl_JHWIyepxxuhgiW7uTP2oAUM6gWKDmUtkcGT4A72c7jq4sm5SRDg7_LLXfx4VeZXScFtIA/s1600/qrcode-pix.png";
const SENHA_ADMIN = "05048989";

/* ===================== ESTADO ===================== */
let jogosCache = {};
let palpitesCache = {};
let adminLogado = sessionStorage.getItem('bolao_admin') === '1';
let viewAtual = 'jogos';
let jogoSelecionado = null;

/* ===================== UTIL ===================== */
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2600);
}
function formatBRL(v){
  return (v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
}
function bandeiraUrl(codigoPais){
  return `https://flagcdn.com/w160/${codigoPais.toLowerCase()}.png`;
}
function imagemTime(j, lado){
  // lado = 'A' ou 'B'. Usa imagem customizada se admin tiver colado uma URL, senão cai no padrão por país.
  const urlCustom = lado==='A' ? j.imagemA : j.imagemB;
  if(urlCustom) return urlCustom;
  const pais = lado==='A' ? j.paisA : j.paisB;
  return bandeiraUrl(pais || 'br');
}

/* Dicionário de seleções/países mais comuns em bolão, pra identificação automática da bandeira */
const PAISES_CODIGO = {
  'brasil':'br','argentina':'ar','alemanha':'de','frança':'fr','franca':'fr',
  'espanha':'es','portugal':'pt','italia':'it','itália':'it','inglaterra':'gb-eng',
  'holanda':'nl','paises baixos':'nl','países baixos':'nl','belgica':'be','bélgica':'be',
  'uruguai':'uy','chile':'cl','colombia':'co','colômbia':'co','mexico':'mx','méxico':'mx',
  'estados unidos':'us','eua':'us','canada':'ca','canadá':'ca','japao':'jp','japão':'jp',
  'coreia do sul':'kr','coreia':'kr','australia':'au','austrália':'au','marrocos':'ma',
  'senegal':'sn','gana':'gh','camaroes':'cm','camarões':'cm','nigeria':'ng','nigéria':'ng',
  'tunisia':'tn','tunísia':'tn','egito':'eg','arabia saudita':'sa','arábia saudita':'sa',
  'qatar':'qa','catar':'qa','irã':'ir','ira':'ir','iraque':'iq','china':'cn','russia':'ru',
  'rússia':'ru','ucrania':'ua','ucrânia':'ua','polonia':'pl','polônia':'pl','suica':'ch',
  'suíça':'ch','suecia':'se','suécia':'se','noruega':'no','dinamarca':'dk','escocia':'gb-sct',
  'escócia':'gb-sct','irlanda':'ie','croacia':'hr','croácia':'hr','servia':'rs','sérvia':'rs',
  'paraguai':'py','peru':'pe','equador':'ec','bolivia':'bo','bolívia':'bo','venezuela':'ve',
  'costa rica':'cr','panama':'pa','panamá':'pa','jamaica':'jm','india':'in','índia':'in',
  'turquia':'tr','grecia':'gr','grécia':'gr','austria':'at','áustria':'at','romenia':'ro',
  'romênia':'ro','hungria':'hu','islandia':'is','islândia':'is','gales':'gb-wls',
  'africa do sul':'za','áfrica do sul':'za','costa do marfim':'ci','mali':'ml','argelia':'dz',
  'argélia':'dz'
};
function identificarCodigoPais(nomeTime){
  if(!nomeTime) return '';
  const chave = nomeTime.trim().toLowerCase();
  return PAISES_CODIGO[chave] || '';
}
function fmtData(iso){
  if(!iso) return '';
  const d = new Date(iso+'T00:00:00');
  return d.toLocaleDateString('pt-BR');
}

/* ===================== NAVEGAÇÃO ===================== */
document.getElementById('navMenu').addEventListener('click', e=>{
  const btn = e.target.closest('button[data-view]');
  if(!btn) return;
  setView(btn.dataset.view);
});
function setView(v){
  viewAtual = v;
  jogoSelecionado = null;
  document.querySelectorAll('#navMenu button').forEach(b=>{
    b.classList.toggle('active', b.dataset.view===v);
  });
  render();
}

/* ===================== FIREBASE LISTENERS ===================== */
db.ref('jogos').on('value', snap=>{
  jogosCache = snap.val() || {};
  render();
});
db.ref('palpites').on('value', snap=>{
  const novoCache = snap.val() || {};
  detectarNovoPendente(palpitesCache, novoCache);
  palpitesCache = novoCache;
  render();
});

let primeiroCarregamentoPalpites = true;
function detectarNovoPendente(antigo, novo){
  if(primeiroCarregamentoPalpites){
    primeiroCarregamentoPalpites = false;
    return; // não notifica no carregamento inicial da página
  }
  if(!adminLogado) return;
  const idsAntigos = new Set(Object.keys(antigo||{}));
  const idsNovos = Object.keys(novo||{});
  const recemChegados = idsNovos.filter(id=>!idsAntigos.has(id) && !novo[id].pago);
  if(recemChegados.length>0){
    notificarNovoPendente(novo[recemChegados[0]]);
  }
}
function notificarNovoPendente(palpite){
  toast(`🔔 Novo palpite de ${palpite.nome} aguardando confirmação!`);
  if(navigator.vibrate) navigator.vibrate([100,50,100]);
  tocarBeep();
}
function tocarBeep(){
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine'; osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.4);
    osc.start(); osc.stop(ctx.currentTime+0.4);
  }catch(e){}
}

/* ===================== RENDER PRINCIPAL ===================== */
function render(){
  const app = document.getElementById('app');
  if(viewAtual === 'jogos'){
    app.innerHTML = jogoSelecionado ? renderDetalheJogo(jogoSelecionado) : renderListaJogos();
  } else if(viewAtual === 'meus'){
    app.innerHTML = renderMeusPalpites();
  } else if(viewAtual === 'admin'){
    app.innerHTML = adminLogado ? renderAdminPainel() : renderAdminLogin();
  }
  bindEvents();
}

/* ===================== LISTA DE JOGOS (PÚBLICO) ===================== */
function renderListaJogos(){
  const ids = Object.keys(jogosCache).sort((a,b)=> (jogosCache[b].criadoEm||0)-(jogosCache[a].criadoEm||0));
  if(ids.length===0){
    return `<div class="empty">Nenhum jogo cadastrado ainda.<br>Volte em breve! ⚽</div>`;
  }
  return ids.map(id=>{
    const j = jogosCache[id];
    const aberto = j.status !== 'encerrado';
    return `
    <div class="card jogo-card" data-jogo="${id}">
      <div class="placar-row">
        <div class="time"><img src="${imagemTime(j,'A')}" alt="${j.timeA}"><span>${j.timeA}</span></div>
        ${j.status==='encerrado' && j.placarA!=null
          ? `<div class="placar-final">${j.placarA} <span style="font-size:1rem;color:#999">x</span> ${j.placarB}</div>`
          : `<div class="vs">X</div>`}
        <div class="time"><img src="${imagemTime(j,'B')}" alt="${j.timeB}"><span>${j.timeB}</span></div>
      </div>
      <div class="meta-row">
        <span class="valor">${formatBRL(j.valor)}</span>
        <span>${fmtData(j.data)}</span>
        <span class="badge ${aberto?'aberto':'encerrado'}">${aberto?'Aberto':'Encerrado'}</span>
      </div>
    </div>`;
  }).join('');
}

/* ===================== DETALHE DO JOGO + PALPITAR ===================== */
function renderDetalheJogo(id){
  const j = jogosCache[id];
  if(!j) return `<div class="empty">Jogo não encontrado.</div>`;
  const palpitesDoJogo = Object.entries(palpitesCache).filter(([_,p])=>p.jogoId===id);
  const pagos = palpitesDoJogo.filter(([_,p])=>p.pago);
  const arrecadado = pagos.length * j.valor;
  const premioTotal = arrecadado * (1-TAXA_ADMIN);

  // Agrupa pagos por placar exato, pra saber quantos concorrem em cada combinação
  const contagemPorPlacar = {};
  pagos.forEach(([_,p])=>{
    const k = `${p.placarA}x${p.placarB}`;
    contagemPorPlacar[k] = (contagemPorPlacar[k]||0)+1;
  });

  let resultadoHtml = '';
  if(j.status==='encerrado' && j.placarA!=null){
    const ganhadores = pagos.filter(([_,p])=>p.placarA===j.placarA && p.placarB===j.placarB);
    if(j.sorteioId){
      const sorteado = palpitesCache[j.sorteioId];
      resultadoHtml = `
        <div class="premio-box">
          <div style="font-size:.8rem;font-weight:700;color:var(--azul)">🎟️ NINGUÉM ACERTOU O PLACAR — FOI PRA RIFA</div>
          <div class="premio-valor">${sorteado? sorteado.nome : '—'}</div>
          <div class="small-text">Levou o prêmio de ${formatBRL(premioTotal)} no sorteio entre os ${pagos.length} participantes pagos</div>
        </div>`;
    } else if(ganhadores.length>0){
      const cada = premioTotal/ganhadores.length;
      resultadoHtml = `

  if(inA && inB){
    const atualizar = ()=>atualizarPreviewGanho(jogoSelecionado);

  }

  const btnLoginAdmin = document.getElementById('btnLoginAdmin');

  if(novoImagemA) novoImagemA.addEventListener('input', ()=>atualizarPreviewBandeira('A'));
  if(novoImagemB) novoImagemB.addEventListener('input', ()=>atualizarPreviewBandeira('B'));

  document.querySelectorAll('.btn-confirmar-pgto').forEach(b=>{
    b.onclick = ()=> confirmarPagamento(b.dataset.id);
  });
  document.querySelectorAll('.btn-remover-palpite').forEach(b=>{

  });

  const buscaPendentes = document.getElementById('buscaPendentes');

    // mantém o foco e a posição do cursor ao re-renderizar enquanto digita
    const pos = buscaPendentes.selectionStart;
    buscaPendentes.focus();
    buscaPendentes.setSelectionRange(pos, pos);
    buscaPendentes.oninput = ()=>{ adminTabAtual='pagamentos'; render(); };
  }
  document.querySelectorAll('.btn-lancar-resultado').forEach(b=>{
    b.onclick = ()=> lancarResultado(b.dataset.jogo);
  });
  document.querySelectorAll('.btn-sortear').forEach(b=>{
    b.onclick = ()=> sortearGanhador(b.dataset.jogo);
  });
  document.querySelectorAll('.btn-excluir-jogo').forEach(b=>{
    b.onclick = ()=> excluirJogo(b.dataset.jogo);
  });
  document.querySelectorAll('.btn-editar-bandeira').forEach(b=>{
    b.onclick = ()=> editarBandeira(b.dataset.jogo);
  });
}

let timeoutPreviewGanho = null;
function atualizarPreviewGanho(jogoId){
  const a = document.getElementById('palpiteA').value;
  const b = document.getElementById('palpiteB').value;
  clearTimeout(timeoutPreviewGanho);
  if(a==='' || b===''){ fecharPopupGanho(); return; }
  // pequeno debounce pra não abrir popup a cada tecla, só quando a pessoa pausa de digitar
  timeoutPreviewGanho = setTimeout(()=> mostrarPopupGanho(jogoId, a, b), 450);
}

function mostrarPopupGanho(jogoId, a, b){
  const j = jogosCache[jogoId];
  if(!j) return;

  const pagos = Object.entries(palpitesCache).filter(([_,p])=>p.jogoId===jogoId && p.pago);
  const arrecadado = pagos.length * j.valor;

  // quantos JÁ pagaram com esse mesmo placar (sem contar você ainda, já que você nem pagou)
  const concorrentes = pagos.filter(([_,p])=>p.placarA===parseInt(a) && p.placarB===parseInt(b)).length;
  const totalSeVoceEntrar = concorrentes + 1; // você entraria nessa disputa
  const arrecadadoComVoce = arrecadado + j.valor;
  const taxaOrganizacao = arrecadadoComVoce * TAXA_ADMIN;
  const premioComVoce = arrecadadoComVoce - taxaOrganizacao;
  const seuGanho = premioComVoce / totalSeVoceEntrar;

  let popup = document.getElementById('popupGanho');
  if(!popup){
    popup = document.createElement('div');
    popup.id = 'popupGanho';
    popup.className = 'popup-overlay';
    document.body.appendChild(popup);
    popup.onclick = (e)=>{ if(e.target===popup) fecharPopupGanho(); };
  }
  popup.innerHTML = `
    <div class="popup-box">
      <button class="popup-fechar" id="btnFecharPopupGanho">✕</button>
      <div class="popup-emoji">💰</div>
      <div class="popup-titulo">Se o placar for ${a} x ${b}...</div>
      <div class="popup-ganho-valor">${formatBRL(seuGanho)}</div>
      <div class="popup-sub">é o que você ganharia</div>
      <div class="popup-detalhe">
        <div class="popup-linha"><span>Mesa total (com você)</span><span>${formatBRL(arrecadadoComVoce)}</span></div>
        <div class="popup-linha"><span>Taxa da organização (20%)</span><span>− ${formatBRL(taxaOrganizacao)}</span></div>
        <div class="popup-linha"><span>Prêmio a dividir</span><span>${formatBRL(premioComVoce)}</span></div>
        <div class="popup-linha"><span>Concorrendo com esse placar</span><span>${totalSeVoceEntrar} pessoa${totalSeVoceEntrar>1?'s':''}</span></div>
      </div>
      <div class="popup-aviso">⚠️ Esse valor é calculado com base em quem já pagou até agora. Pode mudar até o fim das apostas.</div>
      <div class="popup-aviso popup-aviso-rifa">🎟️ Se ninguém acertar o palpite, o dinheiro será sorteado entre os participantes.</div>
    </div>`;
  popup.classList.add('show');
  document.getElementById('btnFecharPopupGanho').onclick = fecharPopupGanho;
}

function fecharPopupGanho(){
  const popup = document.getElementById('popupGanho');
  if(popup) popup.classList.remove('show');
}

function enviarPalpite(){
  const nome = document.getElementById('palpiteNome').value.trim();
  const telefone = document.getElementById('palpiteTelefone').value.trim();
  const placarA = document.getElementById('palpiteA').value;
  const placarB = document.getElementById('palpiteB').value;

  if(!nome || !telefone){ toast('Preencha nome e telefone'); return; }
  if(placarA==='' || placarB===''){ toast('Preencha o placar do seu palpite'); return; }
  fecharPopupGanho();

  const novo = {
    jogoId: jogoSelecionado,
    nome, telefone,
    placarA: parseInt(placarA), placarB: parseInt(placarB),
    pago: false,
    criadoEm: Date.now()
  };
  const ref = db.ref('palpites').push();
  ref.set(novo).then(()=>{
    palpitePendenteId = ref.key;
    render();
    mostrarPix();
  });
}

function autoIdentificarBandeira(lado){
  const nomeInput = document.getElementById('novoTime'+lado);
  const paisInput = document.getElementById('novoPais'+lado);
  if(!nomeInput || !paisInput) return;
  const codigo = identificarCodigoPais(nomeInput.value);
  if(codigo){
    paisInput.value = codigo;
  }
  atualizarPreviewBandeira(lado);
}

function atualizarPreviewBandeira(lado){
  const preview = document.getElementById('previewBandeira'+lado);
  if(!preview) return;
  const imagemInput = document.getElementById('novoImagem'+lado);
  const paisInput = document.getElementById('novoPais'+lado);
  const urlCustom = imagemInput ? imagemInput.value.trim() : '';
  const codigo = paisInput ? paisInput.value.trim() : '';
  const url = urlCustom || (codigo ? bandeiraUrl(codigo) : '');
  if(!url){ preview.innerHTML=''; return; }
  preview.innerHTML = `<img src="${url}" alt="preview" onerror="this.style.display='none'"> <span>${urlCustom?'imagem customizada':'bandeira identificada: '+codigo.toUpperCase()}</span>`;
}

function criarJogo(){
  const timeA = document.getElementById('novoTimeA').value.trim();
  const paisA = document.getElementById('novoPaisA').value.trim().toLowerCase();
  const imagemA = document.getElementById('novoImagemA').value.trim();
  const timeB = document.getElementById('novoTimeB').value.trim();
  const paisB = document.getElementById('novoPaisB').value.trim().toLowerCase();
  const imagemB = document.getElementById('novoImagemB').value.trim();
  const valor = parseFloat(document.getElementById('novoValor').value);
  const data = document.getElementById('novoData').value;

  if(!timeA || !timeB || !paisA || !paisB || !valor || !data){
    toast('Preencha todos os campos'); return;
  }
  db.ref('jogos').push({
    timeA, paisA, imagemA: imagemA || null,
    timeB, paisB, imagemB: imagemB || null,
    valor, data,
    status:'aberto', criadoEm: Date.now()
  }).then(()=>{
    toast('Jogo criado!');
    render();
  });
}

function editarBandeira(id){
  const j = jogosCache[id];
  if(!j) return;
  const novaA = prompt(`URL da imagem do ${j.timeA} (deixe vazio para usar bandeira padrão):`, j.imagemA||'');
  if(novaA===null) return;
  const novaB = prompt(`URL da imagem do ${j.timeB} (deixe vazio para usar bandeira padrão):`, j.imagemB||'');
  if(novaB===null) return;
  db.ref('jogos/'+id).update({
    imagemA: novaA.trim() || null,
    imagemB: novaB.trim() || null
  }).then(()=>toast('Imagem(ns) atualizada(s)!'));
}

function excluirJogo(id){
  if(!confirm('Excluir este jogo e todos os palpites relacionados?')) return;
  db.ref('jogos/'+id).remove();
  Object.entries(palpitesCache).filter(([_,p])=>p.jogoId===id).forEach(([pid])=>{
    db.ref('palpites/'+pid).remove();
  });
  toast('Jogo excluído');
}

function renderAdminPagamentos(){
  const termoBusca = (document.getElementById('buscaPendentes')?.value || '').toLowerCase().trim();
  let pendentes = Object.entries(palpitesCache).filter(([_,p])=>!p.pago);
  pendentes = pendentes.sort((a,b)=>(b[1].criadoEm||0)-(a[1].criadoEm||0)); // mais recente primeiro
  if(termoBusca){
    pendentes = pendentes.filter(([_,p])=>
      p.nome.toLowerCase().includes(termoBusca) || p.telefone.includes(termoBusca));
  }
  const pagos = Object.entries(palpitesCache).filter(([_,p])=>p.pago).sort((a,b)=>(b[1].criadoEm||0)-(a[1].criadoEm||0));
  return `
  <div class="card">
    <input type="text" id="buscaPendentes" placeholder="🔎 Buscar por nome ou telefone..." value="${termoBusca}">
  </div>
  <div class="card">
    <h3 style="margin-bottom:8px;font-size:1rem">⏳ Pendentes de confirmação (${pendentes.length})</h3>
    ${pendentes.length===0 ? '<div class="empty">Nenhum pagamento pendente.</div>' :
      pendentes.map(([id,p])=>{
        const j = jogosCache[p.jogoId];
        const valor = j ? formatBRL(j.valor) : '';
        const msgWhats = encodeURIComponent(`Oi ${p.nome}! Confirmamos seu pagamento do bolão (${j?`${j.timeA} x ${j.timeB}`:''} — palpite ${p.placarA}x${p.placarB}). Boa sorte! ⚽`);
        const telLimpo = p.telefone.replace(/\D/g,'');
        return `
        <div class="pendente-card">
          <div class="pendente-info">
            <div class="pendente-nome">${p.nome}</div>
            <div class="pendente-tel">${p.telefone}</div>
            <div class="small-text">${j?`${j.timeA} x ${j.timeB}`:'(jogo removido)'} — Palpite: <strong>${p.placarA}x${p.placarB}</strong> — ${valor}</div>
          </div>
          <div class="pendente-acoes">
            <button class="btn-confirmar-pgto btn-confirmar-grande" data-id="${id}">✓ CONFIRMAR PIX</button>
            <div class="pendente-acoes-sec">
              <a href="https://wa.me/55${telLimpo}?text=${msgWhats}" target="_blank" class="btn-whats">WhatsApp</a>
              <button class="btn-remover-palpite" data-id="${id}">remover</button>
            </div>
          </div>
        </div>`;
      }).join('')}
  </div>
  <div class="card">
    <h3 style="margin-bottom:8px;font-size:1rem">✓ Confirmados (${pagos.length})</h3>
    ${pagos.length===0 ? '<div class="empty">Nenhum pagamento confirmado ainda.</div>' :
      pagos.map(([id,p])=>{
        const j = jogosCache[p.jogoId];
        return `<div class="palpite-item">
          <span>${p.nome} — ${j?`${j.timeA}x${j.timeB}`:''} (${p.placarA}x${p.placarB})</span>
          <button class="btn-remover-palpite" data-id="${id}" style="background:none;border:none;color:var(--vermelho);cursor:pointer;font-size:.75rem">remover</button>
        </div>`;
      }).join('')}
  </div>
  `;
}

function confirmarPagamento(id){
  db.ref('palpites/'+id+'/pago').set(true).then(()=>{
    toast('✓ Pix confirmado!');
    if(navigator.vibrate) navigator.vibrate(80);
  });
}
function removerPalpite(id){
  if(!confirm('Remover este palpite?')) return;
  db.ref('palpites/'+id).remove().then(()=>toast('Palpite removido'));
}

function renderAdminResultados(){
  const abertos = Object.entries(jogosCache).filter(([_,j])=>j.status!=='encerrado');
  const encerrados = Object.entries(jogosCache).filter(([_,j])=>j.status==='encerrado');
  return `
  <div class="card">
    <h3 style="margin-bottom:8px;font-size:1rem">🔓 Jogos abertos — lançar resultado</h3>
    ${abertos.length===0?'<div class="empty">Nenhum jogo aberto.</div>':
      abertos.map(([id,j])=>`
      <div class="card" style="background:#fafbfc">
        <div style="font-weight:700;margin-bottom:8px">${j.timeA} x ${j.timeB}</div>
        <div class="placar-inputs">
          <input type="number" min="0" id="resA_${id}" placeholder="0" style="width:50px">
          <span>x</span>
          <input type="number" min="0" id="resB_${id}" placeholder="0" style="width:50px">
        </div>
        <button class="btn-lancar-resultado btn btn-amarelo" data-jogo="${id}">Lançar resultado e encerrar</button>
      </div>`).join('')}
  </div>
  <div class="card">
    <h3 style="margin-bottom:8px;font-size:1rem">🏁 Jogos encerrados</h3>
    ${encerrados.length===0?'<div class="empty">Nenhum jogo encerrado ainda.</div>':
      encerrados.map(([id,j])=>{
        const pagos = Object.entries(palpitesCache).filter(([_,p])=>p.jogoId===id && p.pago);
        const ganhadores = pagos.filter(([_,p])=>p.placarA===j.placarA && p.placarB===j.placarB);
        const precisaSorteio = ganhadores.length===0 && pagos.length>0 && !j.sorteioId;
        return `
        <div class="card" style="background:#fafbfc">
          <div style="font-weight:700">${j.timeA} ${j.placarA} x ${j.placarB} ${j.timeB}</div>
          <div class="small-text">${pagos.length} pago(s) · ${ganhadores.length} acertador(es)</div>
          ${precisaSorteio ? `<button class="btn-sortear btn btn-amarelo" data-jogo="${id}" style="margin-top:8px">🎟️ Ninguém acertou — Sortear ganhador</button>` : ''}
          ${j.sorteioId ? `<div class="small-text" style="color:var(--verde);font-weight:700">Sorteado: ${palpitesCache[j.sorteioId]?.nome||'—'}</div>` : ''}
        </div>`;
      }).join('')}
  </div>
  `;
}

function lancarResultado(jogoId){
  const a = document.getElementById('resA_'+jogoId).value;
  const b = document.getElementById('resB_'+jogoId).value;
  if(a==='' || b===''){ toast('Preencha o placar final'); return; }
  if(!confirm('Confirmar resultado e encerrar o jogo? Essa ação não pode ser desfeita.')) return;
  db.ref('jogos/'+jogoId).update({
    status:'encerrado', placarA: parseInt(a), placarB: parseInt(b)
  }).then(()=>{
    toast('Resultado lançado!');
    render();
  });
}

function sortearGanhador(jogoId){
  const pagos = Object.entries(palpitesCache).filter(([_,p])=>p.jogoId===jogoId && p.pago);
  if(pagos.length===0){ toast('Nenhum participante pago para sortear'); return; }
  const sorteadoIdx = Math.floor(Math.random()*pagos.length);
  const [sorteadoId, sorteadoPalpite] = pagos[sorteadoIdx];
  if(!confirm(`Sortear entre ${pagos.length} participantes pagos?`)) return;
  db.ref('jogos/'+jogoId+'/sorteioId').set(sorteadoId).then(()=>{
    toast(`🎉 Sorteado: ${sorteadoPalpite.nome}`);
    render();
  });
}

/* ===================== INIT ===================== */
render();
</script>
</body>
</html>
